<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz VR - GPU</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#050816;
}
</style>

</head>

<body>

<a-scene background="color:#050816">

    <!-- LUZ -->
    <a-light
        type="ambient"
        intensity="1">
    </a-light>

    <!-- CAMERA -->
    <a-camera
        position="0 1.6 0"
        raycaster="objects: .clickable">

        <a-cursor
            fuse="true"
            fuse-timeout="2000"
            color="#38bdf8">
        </a-cursor>

    </a-camera>

    <!-- QUIZ -->
    <a-entity id="quiz"></a-entity>

</a-scene>

<script>

const perguntas = [

{
    pergunta:"Qual e a funcao principal da GPU?",
    opcoes:[
        "Processar graficos",
        "Armazenar arquivos",
        "Fornecer energia"
    ],
    correta:0
},

{
    pergunta:"GPU significa:",
    opcoes:[
        "Graphics Processing Unit",
        "General Processing Unit",
        "Graphic Power Utility"
    ],
    correta:0
},

{
    pergunta:"A GPU e utilizada principalmente para:",
    opcoes:[
        "Jogos e renderizacao",
        "Armazenamento",
        "Rede"
    ],
    correta:0
},

{
    pergunta:"Qual componente exibe o resultado processado pela GPU?",
    opcoes:[
        "Monitor",
        "HD",
        "Fonte"
    ],
    correta:0
},

{
    pergunta:"Qual atividade exige mais da GPU?",
    opcoes:[
        "Renderizar graficos 3D",
        "Salvar arquivos",
        "Digitar texto"
    ],
    correta:0
}

];

let atual = 0;
let pontosQuiz = 0;

const quiz = document.getElementById("quiz");

function limpar(){

    quiz.innerHTML = "";

}

function renderizar(){

    limpar();

    if(atual >= perguntas.length){

        resultado();
        return;

    }

    const q = perguntas[atual];

    // PERGUNTA
    const titulo = document.createElement("a-text");

    titulo.setAttribute("value", q.pergunta);
    titulo.setAttribute("position", "0 2.5 -3");
    titulo.setAttribute("align", "center");
    titulo.setAttribute("color", "#38bdf8");
    titulo.setAttribute("width", "6");

    quiz.appendChild(titulo);

    // PONTUACAO
    const score = document.createElement("a-text");

    score.setAttribute(
        "value",
        `Pontos neste quiz: ${pontosQuiz}`
    );

    score.setAttribute(
        "position",
        "-2.2 3.2 -3"
    );

    score.setAttribute(
        "color",
        "#ffffff"
    );

    score.setAttribute(
        "width",
        "4"
    );

    quiz.appendChild(score);

    // OPCOES
    q.opcoes.forEach((op,i)=>{

        const container =
        document.createElement("a-entity");

        container.setAttribute(
            "position",
            `0 ${1.8 - i*0.9} -3`
        );

        const btn =
        document.createElement("a-plane");

        btn.setAttribute("width","4");
        btn.setAttribute("height","0.75");
        btn.setAttribute("color","#06b6d4");
        btn.setAttribute("class","clickable");

        btn.setAttribute(
            "material",
            "shader:flat; opacity:0.9"
        );

        const txt =
        document.createElement("a-text");

        txt.setAttribute("value",op);
        txt.setAttribute("align","center");
        txt.setAttribute("color","#ffffff");
        txt.setAttribute("width","6");
        txt.setAttribute("position","0 0 0.05");

        container.appendChild(btn);
        container.appendChild(txt);

        let respondido = false;

        container.addEventListener("click",()=>{

            if(respondido) return;

            respondido = true;

            if(i === q.correta){

                btn.setAttribute(
                    "color",
                    "#22c55e"
                );

                pontosQuiz += 10;

            }
            else{

                btn.setAttribute(
                    "color",
                    "#ef4444"
                );

            }

            setTimeout(()=>{

                atual++;

                renderizar();

            },3000);

        });

        quiz.appendChild(container);

    });

}

function resultado(){

    limpar();

    // SALVA PONTOS APENAS UMA VEZ
    if(!localStorage.getItem("quiz_gpu_concluido")){

        let pontosGerais =
        Number(localStorage.getItem("pontuacao")) || 0;

        pontosGerais += pontosQuiz;

        localStorage.setItem(
            "pontuacao",
            pontosGerais
        );

        localStorage.setItem(
            "quiz_gpu_concluido",
            "true"
        );

    }

    const total =
    Number(localStorage.getItem("pontuacao")) || 0;

    // PAINEL
    const painel =
    document.createElement("a-plane");

    painel.setAttribute("width","5");
    painel.setAttribute("height","3");
    painel.setAttribute("position","0 1.6 -3");

    painel.setAttribute(
        "material",
        "color:#0b1220; opacity:0.95; shader:flat"
    );

    // TEXTO
    const texto =
    document.createElement("a-text");

    texto.setAttribute(
        "value",
        `Quiz Finalizado!\nPontuacao Total: ${total}`
    );

    texto.setAttribute(
        "align",
        "center"
    );

    texto.setAttribute(
        "color",
        "#38bdf8"
    );

    texto.setAttribute(
        "width",
        "6"
    );

    texto.setAttribute(
        "position",
        "0 0.6 0.01"
    );

    // BOTAO
    const botao =
    document.createElement("a-plane");

    botao.setAttribute(
        "width",
        "2.6"
    );

    botao.setAttribute(
        "height",
        "0.8"
    );

    botao.setAttribute(
        "position",
        "0 -0.6 0.01"
    );

    botao.setAttribute(
        "color",
        "#38bdf8"
    );

    botao.setAttribute(
        "class",
        "clickable"
    );

    const textoBotao =
    document.createElement("a-text");

    textoBotao.setAttribute(
        "value",
        "Voltar ao laboratorio"
    );

    textoBotao.setAttribute(
        "align",
        "center"
    );

    textoBotao.setAttribute(
        "color",
        "#ffffff"
    );

    textoBotao.setAttribute(
        "width",
        "5"
    );

    textoBotao.setAttribute(
        "position",
        "0 0 0.05"
    );

    botao.appendChild(textoBotao);

    botao.addEventListener(
        "click",
        ()=>{
            window.location.href = "laboratorio.html";
        }
    );

    painel.appendChild(texto);
    painel.appendChild(botao);

    quiz.appendChild(painel);

}

renderizar();

</script>

</body>
</html>

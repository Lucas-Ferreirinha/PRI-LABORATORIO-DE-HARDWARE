<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz VR - Memória RAM</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #050816;
    }
  </style>
</head>

<body>

<a-scene background="color: #050816">

  <!-- LUZ -->
  <a-light type="ambient" intensity="1"></a-light>

  <!-- CÂMERA -->
  <a-entity>
    <a-camera position="0 1.6 0"
      raycaster="objects: .clickable"
      cursor="fuse: true; fuse-timeout: 800">

      <a-cursor color="#a855f7"></a-cursor>

    </a-camera>
  </a-entity>

  <!-- QUIZ -->
  <a-entity id="quiz"></a-entity>

</a-scene>

<script>

const perguntas = [
  {
    pergunta: "Qual é a funçao da memoria RAM?",
    opcoes: [
      "Armazenar dados temporários",
      "Processar instrucoes",
      "Resfriar o sistema"
    ],
    correta: 0
  },
  {
    pergunta: "A memoria RAM perde dados quando o computador desliga?",
    opcoes: [
      "Sim",
      "Nao",
      "Apenas às vezes"
    ],
    correta: 0
  },
  {
    pergunta: "A RAM e importante porque:",
    opcoes: [
      "Acelera o acesso aos dados",
      "Guarda arquivos permanentemente",
      "Gera energia"
    ],
    correta: 0
  }
];

let atual = 0;
let pontos = Number(localStorage.getItem("pontuacao")) || 0;

const quiz = document.getElementById("quiz");

function limpar() {
  quiz.innerHTML = "";
}

function renderizar() {

  limpar();

  if (atual >= perguntas.length) return resultado();

  const q = perguntas[atual];

  // PERGUNTA
  const titulo = document.createElement("a-text");
  titulo.setAttribute("value", q.pergunta);
  titulo.setAttribute("position", "0 2.5 -3");
  titulo.setAttribute("align", "center");
  titulo.setAttribute("color", "#a855f7");
  titulo.setAttribute("width", "6");

  quiz.appendChild(titulo);

  // OPÇÕES
  q.opcoes.forEach((op, i) => {

    const container = document.createElement("a-entity");
    container.setAttribute("position", `0 ${1.8 - i * 0.9} -3`);

    const btn = document.createElement("a-plane");
    btn.setAttribute("width", "4");
    btn.setAttribute("height", "0.75");
    btn.setAttribute("color", "#a855f7");
    btn.setAttribute("class", "clickable");
    btn.setAttribute("material", "shader:flat; opacity:0.9");

    const txt = document.createElement("a-text");
    txt.setAttribute("value", op);
    txt.setAttribute("align", "center");
    txt.setAttribute("color", "#ffffff");
    txt.setAttribute("width", "6");
    txt.setAttribute("position", "0 0 0.05");

    container.appendChild(btn);
    container.appendChild(txt);

    container.addEventListener("click", () => {

      if (i === q.correta) {
        btn.setAttribute("color", "#22c55e");
        pontos += 10;
      } else {
        btn.setAttribute("color", "#ef4444");
      }

      localStorage.setItem("pontuacao", pontos);

      setTimeout(() => {
        atual++;
        renderizar();
      }, 800);

    });

    quiz.appendChild(container);

  });

}

// 🔥 RESULTADO FINAL PADRÃO IF
function resultado() {

  limpar();

  const painel = document.createElement("a-plane");
  painel.setAttribute("width", "4.8");
  painel.setAttribute("height", "3");
  painel.setAttribute("position", "0 1.6 -3");
  painel.setAttribute("material", "color:#0b1220; opacity:0.95; shader:flat");

  const txt = document.createElement("a-text");
  txt.setAttribute("value", `Pontuação final: ${pontos}`);
  txt.setAttribute("align", "center");
  txt.setAttribute("color", "#a855f7");
  txt.setAttribute("width", "6");
  txt.setAttribute("position", "0 0.6 0.01");

  const btn = document.createElement("a-plane");
  btn.setAttribute("width", "2.5");
  btn.setAttribute("height", "0.7");
  btn.setAttribute("position", "0 -0.5 0.01");
  btn.setAttribute("color", "#a855f7");
  btn.setAttribute("class", "clickable");
  btn.setAttribute("material", "shader:flat; opacity:0.9");

  const bt = document.createElement("a-text");
  bt.setAttribute("value", "Voltar ao laboratório");
  bt.setAttribute("align", "center");
  bt.setAttribute("color", "#ffffff");
  bt.setAttribute("width", "5");
  bt.setAttribute("position", "0 0 0.05");

  btn.appendChild(bt);

  btn.addEventListener("click", () => {
    window.location.href = "index.html";
  });

  painel.appendChild(txt);
  painel.appendChild(btn);

  quiz.appendChild(painel);
}

renderizar();

</script>

</body>
</html>

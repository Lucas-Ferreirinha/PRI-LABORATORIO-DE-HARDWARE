<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Slides Processador</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
}
</style>

</head>
<body>

<a-scene background="color:#05070d">

    <!-- ASSETS -->
    <a-assets>

        <img
            id="slideCPU"
            src="images/cpu.png">

    </a-assets>

    <!-- LUZ -->
    <a-light
        type="ambient"
        intensity="1">
    </a-light>

    <!-- CHAO -->
    <a-plane
        rotation="-90 0 0"
        width="50"
        height="50"
        color="#111827">
    </a-plane>

    <!-- TELA -->
    <a-plane
        src="#slideCPU"
        width="12"
        height="6.75"
        position="0 4 -10">
    </a-plane>

    <!-- TITULO -->
    <a-text
        value="PROCESSADOR"
        position="0 8 -10"
        align="center"
        color="#38bdf8"
        width="12">
    </a-text>

    <!-- BOTAO SAIR -->
    <a-plane
        id="exit"
        class="clickable"
        color="#ef4444"
        width="3"
        height="0.8"
        position="0 0.5 -8">

        <a-text
            value="VOLTAR"
            align="center"
            color="#FFFFFF"
            width="6"
            position="0 0 0.05">
        </a-text>

    </a-plane>

    <!-- CAMERA -->
    <a-camera
        position="0 1.6 -4"
        raycaster="objects: .clickable">

        <a-cursor
            fuse="true"
            fuse-timeout="2000"
            color="#00e5ff">
        </a-cursor>

    </a-camera>

</a-scene>

<script>

document
.getElementById("exit")
.addEventListener("click",()=>{

    window.location.href = "laboratorio.html";

});

</script>

</body>
</html>

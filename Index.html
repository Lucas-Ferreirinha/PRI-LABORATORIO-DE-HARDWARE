<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Lab VR - PC Interativo</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>

    <!-- ASSETS -->
    <a-assets>
      <!-- Imagem da GPU com fundo transparente -->
      <img id="gpuTexture" src="images/gpu.png">
    </a-assets>

    <!-- FUNDO -->
    <a-sky color="#0f172a"></a-sky>

    <!-- LUZES -->
    <a-light type="ambient" intensity="0.6"></a-light>
    <a-light type="directional" position="2 5 3" intensity="0.8"></a-light>

    <!-- CHÃO -->
    <a-plane rotation="-90 0 0" width="30" height="30" color="#020617"></a-plane>

    <!-- MESA -->
    <a-box position="0 1 0" width="1.2" height="0.3" depth="1.2" color="#8B4513"></a-box>

    <!-- CÂMERA (apenas rotação) -->
    <a-entity id="cameraRig">
      <a-camera position="0 1.6 0" wasd-controls-enabled="false">
        <a-cursor color="#00ffff"></a-cursor>
      </a-camera>
    </a-entity>

    <!-- TEXTO PRINCIPAL -->
    <a-text id="label"
            value="Clique em um componente"
            position="0 3 -1"
            align="center"
            color="#00ffff"
            width="6"
            look-at="#cameraRig">
    </a-text>

    <!-- CONTAINER PARA COMPONENTES -->
    <a-entity id="componentes"></a-entity>

  </a-scene>

  <script>
    // Componente para fazer os objetos olharem para a câmera
    AFRAME.registerComponent('look-at-camera', {
      tick: function () {
        const cam = document.querySelector('#cameraRig');
        if (!cam) return;
        this.el.object3D.lookAt(cam.object3D.position);
      }
    });

    // Dados dos componentes
    const componentesData = [
      { name: "Processador", type: "box", w: 0.6, h: 0.08, d: 0.6, color: "#2c2c2c" },
      { name: "Cooler", type: "cylinder", radius: 0.4, height: 0.2, color: "#888" },
      { name: "Memória RAM", type: "box", w: 0.8, h: 0.1, d: 0.2, color: "#1e88e5" },
      // Placa-mãe menor
      { name: "Placa-mãe", type: "box", w: 1.2, h: 0.1, d: 0.9, color: "#228B22" },
      { name: "GPU", type: "gpu" },
      { name: "HD / SSD", type: "box", w: 1, h: 0.2, d: 0.7, color: "#555" },
      { name: "Fonte", type: "box", w: 0.8, h: 0.5, d: 0.8, color: "#111" }
    ];

    const radius = 3;
    const centerY = 1.35;
    const container = document.getElementById('componentes');
    const labelText = document.getElementById('label');

    componentesData.forEach((comp, i) => {
      const angle = (i / componentesData.length) * 2 * Math.PI;
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;

      let el;

      // 🎮 GPU com ilusão de 3D usando imagem transparente
      if (comp.type === "gpu") {
        el = document.createElement("a-entity");
        el.setAttribute("position", `${x} ${centerY} ${z}`);
        el.setAttribute("class", "clickable");
        el.setAttribute("data-name", comp.name);
        el.setAttribute("look-at", "#cameraRig");

        // Parte frontal
        const front = document.createElement("a-image");
        front.setAttribute("src", "#gpuTexture");
        front.setAttribute("width", "1.8");
        front.setAttribute("height", "0.8");
        front.setAttribute("material", "shader: flat; transparent: true; side: double");
        front.setAttribute("position", "0 0 0.02");
        el.appendChild(front);

        // Parte traseira (simula espessura)
        const back = document.createElement("a-image");
        back.setAttribute("src", "#gpuTexture");
        back.setAttribute("width", "1.8");
        back.setAttribute("height", "0.8");
        back.setAttribute("material", "shader: flat; transparent: true; side: double");
        back.setAttribute("rotation", "0 180 0");
        back.setAttribute("position", "0 0 -0.02");
        el.appendChild(back);
      }
      // Outros componentes
      else if (comp.type === "box") {
        el = document.createElement("a-box");
        el.setAttribute("width", comp.w);
        el.setAttribute("height", comp.h);
        el.setAttribute("depth", comp.d);
        el.setAttribute("color", comp.color);
        el.setAttribute("position", `${x} ${centerY} ${z}`);
        el.setAttribute("class", "clickable");
        el.setAttribute("data-name", comp.name);
        el.setAttribute("look-at", "#cameraRig");
      }
      else if (comp.type === "cylinder") {
        el = document.createElement("a-cylinder");
        el.setAttribute("radius", comp.radius);
        el.setAttribute("height", comp.height);
        el.setAttribute("color", comp.color);
        el.setAttribute("position", `${x} ${centerY} ${z}`);
        el.setAttribute("class", "clickable");
        el.setAttribute("data-name", comp.name);
        el.setAttribute("look-at", "#cameraRig");
      }

      // Criar rótulo
      const label = document.createElement("a-text");
      label.setAttribute("value", comp.name);
      label.setAttribute("position", `${x} ${centerY + 0.8} ${z}`);
      label.setAttribute("align", "center");
      label.setAttribute("color", "#00ffff");
      label.setAttribute("look-at", "#cameraRig");
      label.setAttribute("width", "4");

      // Evento de clique
      el.addEventListener("click", () => {
        labelText.setAttribute("value", comp.name);
        speechSynthesis.cancel();
        speechSynthesis.speak(new SpeechSynthesisUtterance(comp.name));
      });

      container.appendChild(el);
      container.appendChild(label);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Lab VR - PC Flutuante</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>

      <!-- Céu -->
      <a-sky color="#F5FFFA"></a-sky>

      <!-- Luz -->
      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="2 4 2" intensity="0.8"></a-light>

      <!-- Chão e paredes (apenas visuais) -->
      <a-plane rotation="-90 0 0" width="30" height="30" color="#FFF8DC"></a-plane>
      <a-box position="0 2 -10" width="30" height="4" depth="0.2" color="#F5DEB3"></a-box>
      <a-box position="-15 2 0" width="0.2" height="4" depth="30" color="#F5DEB3"></a-box>
      <a-box position="15 2 0" width="0.2" height="4" depth="30" color="#F5DEB3"></a-box>

      <!-- Mesa central -->
      <a-box position="0 1 -4" width="8" height="0.3" depth="4" color="#8B4513"></a-box>
      <a-box position="0 1.2 -4" width="3" height="0.1" depth="2" color="#2e7d32"></a-box>

      <!-- Componentes do PC flutuante-->
      <a-box position="0 1.35 -4" width="0.6" height="0.2" depth="0.6" color="#444"
             class="clickable" data-name="CPU"
             animation="property: position; dir: alternate; dur: 2000; easing: easeInOutSine; to: 0 1.7 -4; loop: true"
             animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"></a-box>

      <a-cylinder position="0 1.55 -4" radius="0.4" height="0.2" color="#888"
                  class="clickable" data-name="Cooler"
                  animation="property: position; dir: alternate; dur: 2000; easing: easeInOutSine; to: 0 1.9 -4; loop: true"
                  animation__rotate="property: rotation; to: 360 0 0; loop: true; dur: 3000; easing: linear"></a-cylinder>

      <a-box position="-1 1.4 -4" width="0.2" height="0.8" depth="0.1" color="#1e88e5"
             class="clickable" data-name="RAM"
             animation="property: position; dir: alternate; dur: 2000; easing: easeInOutSine; to: -1 1.8 -4; loop: true"></a-box>

      <a-box position="-0.7 1.4 -4" width="0.2" height="0.8" depth="0.1" color="#1e88e5"
             class="clickable" data-name="RAM"
             animation="property: position; dir: alternate; dur: 2000; easing: easeInOutSine; to: -0.7 1.8 -4; loop: true"></a-box>

      <a-box position="1 1.35 -4" width="1.5" height="0.3" depth="0.5"
       material="src: url(gpu.png); side: front"
       class="clickable" data-name="GPU"
       animation="property: position; dir: alternate; dur: 2000; to: 1 1.7 -4; loop: true"
       animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
</a-box>

      <a-box position="0 1.3 -5" width="1" height="0.2" depth="0.7" color="#555"
             class="clickable" data-name="HD/SSD"
             animation="property: position; dir: alternate; dur: 2000; easing: easeInOutSine; to: 0 1.7 -5; loop: true"></a-box>

      <a-box position="1.5 1.3 -5" width="0.8" height="0.5" depth="0.8" color="#111"
             class="clickable" data-name="Fonte"
             animation="property: position; dir: alternate; dur: 2000; easing: easeInOutSine; to: 1.5 1.7 -5; loop: true"></a-box>

      <!-- Quadro -->
      <a-plane position="0 2 -9.8" width="6" height="2" color="#895"></a-plane>

      <!-- Câmera fixa -->
      <a-camera position="0 3.6 4">
        <a-cursor></a-cursor>
      </a-camera>

      <!-- Texto para mostrar nome -->
      <a-text id="label" value="" position="0 3 -3" align="center" color="#000" width="6"></a-text>

    </a-scene>

    <!-- Script de interação -->
    <script>
      const label = document.querySelector("#label");
      document.querySelectorAll(".clickable").forEach(el => {
        el.addEventListener("click", () => {
          const nome = el.getAttribute("data-name");
          label.setAttribute("value", nome);
        });
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lab VR - PC 360 Interativo</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <a-assets>
      <img alt id="cpuTexture" src="images/processador.png">
      <img alt id="coolerTexture" src="images/coller.png">
      <img alt id="gpuTexture" src="images/gpu.png">
      <img alt id="mbTexture" src="images/placa_mae-removebg-preview.png">
      <img alt id="hdTexture" src="images/HD.png">
      <img alt id="ramTexture" src="images/memoriaH.png">
    </a-assets>

    <a-sky color="#0f172a"></a-sky>
    <a-grid material="opacity: 0.1; gridColor: #334155"></a-grid>

    <!-- Cursor VR (olhar) -->
    <a-camera position="0 1.6 0">
      <a-cursor 
        fuse="true" 
        fuse-timeout="1500"
        color="#00ffff"
        scale="0.5 0.5 0.5">
      </a-cursor>
    </a-camera>

    <a-entity id="componentes"></a-entity>

  </a-scene>

  <script>
    const componentesData = [
      { name: "Processador", description: "Executa instruções do sistema.", type: "cpu", link: "quiz_cpu.html", color: "#16a34a" },
      { name: "Cooler", description: "Resfria o processador.", type: "cooler", link: "quiz_cooler.html", color: "#06b6d4" },
      { name: "Memória RAM", description: "Armazena dados temporários.", type: "ram", link: "quiz_ram.html", color: "#a855f7" },
      { name: "Placa-mãe", description: "Conecta todos os componentes.", type: "placa_mae", link: "quiz_placa_mae.html", color: "#f59e0b" },
      { name: "GPU", description: "Processa gráficos.", type: "gpu", link: "quiz_gpu.html", color: "#2563eb" },
      { name: "HD / SSD", description: "Armazenamento permanente.", type: "hd", link: "quiz_hd.html", color: "#ef4444" }
    ];

    const container = document.getElementById("componentes");
    const radius = 3.5; 
    const total = componentesData.length;

    componentesData.forEach((comp, i) => {
      let showingInfo = false;

      const angle = (i / total) * Math.PI * 2;
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;

      const group = document.createElement("a-entity");
      group.setAttribute("position", `${x} 1.6 ${z}`);
      
      const angleDeg = (angle * 180 / Math.PI);
      group.setAttribute("rotation", `0 ${-angleDeg - 90} 0`);

      // Título
      const titleText = document.createElement("a-text");
      titleText.setAttribute("value", comp.name);
      titleText.setAttribute("position", "0 1 0");
      titleText.setAttribute("align", "center");
      titleText.setAttribute("color", "#00ffff");
      titleText.setAttribute("width", "4");

      // Imagem (alvo do olhar)
      const img = document.createElement("a-image");
      const textures = {
        cpu: "#cpuTexture", cooler: "#coolerTexture", gpu: "#gpuTexture",
        placa_mae: "#mbTexture", hd: "#hdTexture", ram: "#ramTexture"
      };
      img.setAttribute("src", textures[comp.type]);
      img.setAttribute("width", "1.5");
      img.setAttribute("height", "1.2");
      img.setAttribute("class", "raycastable");

      // Info
      const infoContainer = document.createElement("a-entity");
      infoContainer.setAttribute("position", "0 -0.9 0");
      infoContainer.setAttribute("visible", false);

      const descText = document.createElement("a-text");
      descText.setAttribute("value", comp.description);
      descText.setAttribute("position", "0 0.15 0");
      descText.setAttribute("align", "center");
      descText.setAttribute("width", "3.5");
      descText.setAttribute("color", "#ffffff");

      const btn = document.createElement("a-plane");
      btn.setAttribute("width", "1.4");
      btn.setAttribute("height", "0.4");
      btn.setAttribute("color", comp.color);
      btn.setAttribute("position", "0 -0.3 0.02");

      const btnTxt = document.createElement("a-text");
      btnTxt.setAttribute("value", "Iniciar Quiz");
      btnTxt.setAttribute("align", "center");
      btnTxt.setAttribute("width", "3.5");
      btnTxt.setAttribute("position", "0 0 0.03");
      
      btn.appendChild(btnTxt);
      infoContainer.appendChild(descText);
      infoContainer.appendChild(btn);

      // 👁️ Olhar na imagem (abre/fecha)
      img.addEventListener("click", () => {
        showingInfo = !showingInfo;

        infoContainer.setAttribute("visible", showingInfo);
        img.setAttribute("scale", showingInfo ? "1.1 1.1 1.1" : "1 1 1");

        if (showingInfo) {
          btn.classList.add("raycastable");
        } else {
          btn.classList.remove("raycastable");
        }
      });

      // 👁️ Olhar no botão (abre quiz)
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        window.location.href = comp.link;
      });

      group.appendChild(titleText);
      group.appendChild(img);
      group.appendChild(infoContainer);
      container.appendChild(group);
    });
  </script>
</body>
</html>

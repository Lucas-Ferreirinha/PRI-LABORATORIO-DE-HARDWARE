<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Lab VR - PC Interativo</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <!-- CENÁRIO -->
    <a-sky color="#F5FFFA"></a-sky>
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="2 4 2" intensity="0.8"></a-light>
    <a-plane rotation="-90 0 0" width="30" height="30" color="#FFF8DC"></a-plane>

    <!-- MESA CENTRAL -->
    <a-box position="0 1 0" width="1" height="0.3" depth="1" color="#8B4513"></a-box>

    <!-- COMPONENTES EM 360° -->
    <!-- CPU -->
    <a-box position="0 1.35 -4" width="0.6" height="0.2" depth="0.6" color="#444" class="clickable" data-name="CPU"></a-box>
    <a-text value="CPU" position="0 2 -4" align="center" color="#000" width="1.5" look-at-camera></a-text>

    <!-- Cooler -->
    <a-cylinder position="3 1.35 -2.6" radius="0.4" height="0.2" color="#888" class="clickable" data-name="Cooler"></a-cylinder>
    <a-text value="Cooler" position="3 2 -2.6" align="center" color="#000" width="1.5" look-at-camera></a-text>

    <!-- RAM -->
    <a-box position="-4 1.35 0" width="0.2" height="0.8" depth="0.1" color="#1e88e5" class="clickable" data-name="RAM"></a-box>
    <a-text value="RAM" position="-4 2.5 0" align="center" color="#000" width="1.5" look-at-camera></a-text>

    <!-- Placa-mãe (menor) -->
    <a-box position="0 1.1 4" width="2" height="0.15" depth="1.5" color="#228B22" class="clickable" data-name="Placa-mãe"></a-box>
    <a-text value="Placa-mãe" position="0 1.8 4" align="center" color="#000" width="1.5" look-at-camera></a-text>

    <!-- GPU -->
    <a-box position="4 1.35 0" width="1.5" height="0.3" depth="0.5" material="src: url(gpu.png); side: front" class="clickable" data-name="GPU"></a-box>
    <a-text value="GPU" position="4 2 0" align="center" color="#000" width="1.5" look-at-camera></a-text>

    <!-- HD / SSD -->
    <a-box position="2.8 1.35 2.8" width="1" height="0.2" depth="0.7" color="#555" class="clickable" data-name="HD/SSD"></a-box>
    <a-text value="HD/SSD" position="2.8 2 2.8" align="center" color="#000" width="1.5" look-at-camera></a-text>

    <!-- Fonte -->
    <a-box position="-2.8 1.35 2.8" width="0.8" height="0.5" depth="0.8" color="#111" class="clickable" data-name="Fonte"></a-box>
    <a-text value="Fonte" position="-2.8 2.2 2.8" align="center" color="#000" width="1.5" look-at-camera></a-text>

    <!-- DETALHES -->
    <a-plane position="0 2 -6" width="6" height="2" color="#895"></a-plane>

    <a-text id="label" value="Clique em um componente" position="0 3 -3" align="center" color="#000" width="6"></a-text>

    <!-- CÂMERA -->
    <a-camera position="0 1.6 0" look-controls="enabled: true; pointerLockEnabled: false" wasd-controls="enabled: false">
      <a-cursor></a-cursor>
    </a-camera>
  </a-scene>

  <script>
    // Textos sempre de frente pra câmera
    AFRAME.registerComponent('look-at-camera', {
      tick: function () {
        const camera = this.el.sceneEl.camera;
        if (!camera) return;
        const cameraPosition = new THREE.Vector3();
        camera.getWorldPosition(cameraPosition);
        this.el.object3D.lookAt(cameraPosition);
      }
    });

    const label = document.querySelector("#label");
    const objetos = document.querySelectorAll(".clickable");
    let selecionado = null;

    objetos.forEach(el => {
      el.addEventListener("click", () => {
        // Volta objeto selecionado anterior
        if (selecionado && selecionado !== el) {
          const original = JSON.parse(selecionado.dataset.originalPosition);
          selecionado.setAttribute("animation__back", {
            property: "position",
            to: `${original.x} ${original.y} ${original.z}`,
            dur: 500,
            easing: "easeInOutSine"
          });
          selecionado.removeAttribute("animation__rotate");
          selecionado.setAttribute("scale", "1 1 1");
          selecionado.setAttribute("material", "emissive", "#000");
        }

        const nome = el.getAttribute("data-name");
        label.setAttribute("value", nome);

        if (!el.dataset.originalPosition) {
          const pos = el.getAttribute("position");
          el.dataset.originalPosition = JSON.stringify(pos);
        }

        const pos = el.getAttribute("position");

        // Animação de subir + girar + escalar
        el.setAttribute("animation", {
          property: "position",
          dir: "alternate",
          dur: 1000,
          easing: "easeInOutSine",
          loop: true,
          to: `${pos.x} ${pos.y + 0.4} ${pos.z}`
        });

        el.setAttribute("animation__rotate", {
          property: "rotation",
          to: "0 360 0",
          loop: true,
          dur: 3000,
          easing: "linear"
        });

        el.setAttribute("animation__scale", {
          property: "scale",
          to: "1.2 1.2 1.2",
          dur: 300
        });

        el.setAttribute("material", "emissive", "#444");

        // Girar suavemente de frente para o usuário
        const camera = document.querySelector("a-camera").object3D;
        const obj = el.object3D;
        const cameraPos = new THREE.Vector3();
        camera.getWorldPosition(cameraPos);
        const dx = cameraPos.x - obj.position.x;
        const dz = cameraPos.z - obj.position.z;
        const rotationY = Math.atan2(dx, dz) * (180 / Math.PI);

        el.setAttribute("animation__look", {
          property: "rotation",
          to: `0 ${rotationY} 0`,
          dur: 500,
          easing: "easeInOutQuad"
        });

        selecionado = el;
      });
    });
  </script>
</body>
</html>

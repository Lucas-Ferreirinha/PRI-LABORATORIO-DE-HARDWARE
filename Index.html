<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lab VR - PC Interativo</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene cursor="rayOrigin: mouse">

    <a-assets>
      <img id="cpuTexture" src="images/processador.png">
      <img id="coolerTexture" src="images/coller.png"> <!-- MANTIDO -->
      <img id="gpuTexture" src="images/gpu.png">
      <img id="mbTexture" src="images/placa_mae-removebg-preview.png">
      <img id="hdTexture" src="images/HD.png">
      <img id="ramTexture" src="images/memoriaH.png">
    </a-assets>

    <a-sky color="#0f172a"></a-sky>

    <a-camera 
      position="0 1.6 2"
      wasd-controls-enabled="false"
      look-controls="enabled: true">
    </a-camera>

    <a-entity id="componentes"></a-entity>

  </a-scene>

  <script>
    const componentesData = [
      { name: "Processador", description: "Executa instruções do sistema.", type: "cpu" },
      { name: "Cooler", description: "Resfria o processador.", type: "cooler" },
      { name: "Memória RAM", description: "Armazena dados temporários.", type: "ram" },
      { name: "Placa-mãe", description: "Conecta todos os componentes.", type: "placa_mae" },
      { name: "GPU", description: "Processa gráficos.", type: "gpu" },
      { name: "HD / SSD", description: "Armazenamento permanente.", type: "hd" }
    ];

    const container = document.getElementById("componentes");

    const cols = 3;
    const spacingX = 2.2;
    const spacingY = 1.6;

    const startX = - (cols - 1) * spacingX / 2;
    const startY = 2;
    const z = -3;

    componentesData.forEach((comp, i) => {

      let showingDesc = false;

      const col = i % cols;
      const row = Math.floor(i / cols);

      const x = startX + col * spacingX;
      const y = startY - row * spacingY;

      const el = document.createElement("a-entity");
      const img = document.createElement("a-image");

      const textures = {
        cpu: "#cpuTexture",
        cooler: "#coolerTexture",
        gpu: "#gpuTexture",
        placa_mae: "#mbTexture",
        hd: "#hdTexture",
        ram: "#ramTexture"
      };

      img.setAttribute("src", textures[comp.type]);
      img.setAttribute("width", "1.2");
      img.setAttribute("height", "0.7");

      el.appendChild(img);
      el.setAttribute("position", `${x} ${y} ${z}`);

      const text = document.createElement("a-text");
      text.setAttribute("value", comp.name);
      text.setAttribute("position", `${x} ${y + 0.7} ${z}`);
      text.setAttribute("align", "center");
      text.setAttribute("color", "#00ffff");
      text.setAttribute("width", "3");

      function criarBotao(texto, cor, link) {
        const btn = document.createElement("a-plane");

        btn.setAttribute("width", "1.6");
        btn.setAttribute("height", "0.4");
        btn.setAttribute("color", cor);
        btn.setAttribute("position", `${x} ${y - 0.7} ${z}`);
        btn.setAttribute("visible", false);
        btn.setAttribute("opacity", "0.9");

        const txt = document.createElement("a-text");
        txt.setAttribute("value", texto);
        txt.setAttribute("align", "center");
        txt.setAttribute("color", "#fff");
        txt.setAttribute("width", "3");

        btn.appendChild(txt);

        btn.addEventListener("click", () => {
          window.location.href = link;
        });

        return btn;
      }

      let botao = null;

      if (comp.type === "cpu") {
        botao = criarBotao("Quiz CPU", "#16a34a", "quiz_cpu.html");
      }

      if (comp.type === "gpu") {
        botao = criarBotao("Quiz GPU", "#2563eb", "quiz_gpu.html");
      }

      if (comp.type === "cooler") {
        botao = criarBotao("Quiz Cooler", "#06b6d4", "quiz_cooler.html");
      }

      if (comp.type === "ram") {
        botao = criarBotao("Quiz RAM", "#a855f7", "quiz_ram.html");
      }

      if (comp.type === "placa_mae") {
        botao = criarBotao("Quiz Placa-mãe", "#f59e0b", "quiz_placa_mae.html");
      }

      if (comp.type === "hd") {
        botao = criarBotao("Quiz HD/SSD", "#ef4444", "quiz_hd.html");
      }

      el.addEventListener("click", () => {
        showingDesc = !showingDesc;

        text.setAttribute(
          "value",
          showingDesc ? comp.description : comp.name
        );

        if (botao) {
          botao.setAttribute("visible", showingDesc);
        }
      });

      container.appendChild(el);
      container.appendChild(text);

      if (botao) {
        container.appendChild(botao);
      }
    });
  </script>

</body>
</html>

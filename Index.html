<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Lab VR - PC Interativo</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>

    <a-assets>
      <img alt id="gpuTexture" src="images/gpu.png">
      <img alt id="mbTexture" src="images/placa_mae-removebg-preview.png">
    </a-assets>

    <a-sky color="#0f172a"></a-sky>

    <a-light type="ambient" intensity="0.6"></a-light>
    <a-light type="directional" position="2 5 3" intensity="0.8"></a-light>

    <a-plane rotation="-90 0 0" width="30" height="30" color="#020617"></a-plane>

    <!-- Câmera -->
    <a-entity id="cameraRig">
      <a-camera position="0 1.6 1.2" wasd-controls-enabled="false">
        <a-cursor color="#00ffff"></a-cursor>
      </a-camera>
    </a-entity>

    <a-entity id="componentes"></a-entity>

  </a-scene>

  <script>
    const componentesData = [
      { name: "Processador", description: "Executa instruções do sistema.", type: "box", w: 0.6, h: 0.08, d: 0.6, color: "#2c2c2c" },
      { name: "Cooler", description: "Resfria o processador.", type: "cylinder", radius: 0.3, height: 0.15, color: "#888" },
      { name: "Memória RAM", description: "Armazena dados temporários.", type: "box", w: 0.8, h: 0.08, d: 0.2, color: "#1e88e5" },
      { name: "Placa-mae", description: "Conecta todos os componentes.", type: "mb" },
      { name: "GPU", description: "Processa gráficos.", type: "gpu" },
      { name: "HD / SSD", description: "Armazenamento permanente.", type: "box", w: 0.8, h: 0.15, d: 0.5, color: "#555" },
      { name: "Fonte", description: "Distribui energia.", type: "box", w: 0.6, h: 0.4, d: 0.6, color: "#111" }
    ];

    const container = document.getElementById('componentes');

    const cols = 3;
    const spacingX = 1.6;
    const spacingY = 1.4;

    const startX = -2;
    const startY = 2;
    const z = -2.5;

    componentesData.forEach((comp, i) => {

      const col = i % cols;
      const row = Math.floor(i / cols);

      const x = startX + col * spacingX;
      const y = startY - row * spacingY;

      let el;
      let showingDesc = false;

      if (comp.type === "gpu") {
        el = document.createElement("a-entity");
        el.setAttribute("position", `${x} ${y} ${z}`);

        const img = document.createElement("a-image");
        img.setAttribute("src", "#gpuTexture");
        img.setAttribute("width", "1.1");
        img.setAttribute("height", "0.55");

        el.appendChild(img);
      }

      else if (comp.type === "mb") {
        el = document.createElement("a-entity");
        el.setAttribute("position", `${x} ${y} ${z}`);

        const img = document.createElement("a-image");
        img.setAttribute("src", "#mbTexture");
        img.setAttribute("width", "1.2");
        img.setAttribute("height", "0.8");

        el.appendChild(img);
      }

      else if (comp.type === "box") {
        el = document.createElement("a-box");
        el.setAttribute("width", comp.w);
        el.setAttribute("height", comp.h);
        el.setAttribute("depth", comp.d);
        el.setAttribute("color", comp.color);
        el.setAttribute("position", `${x} ${y} ${z}`);
      }

      else if (comp.type === "cylinder") {
        el = document.createElement("a-cylinder");
        el.setAttribute("radius", comp.radius);
        el.setAttribute("height", comp.height);
        el.setAttribute("color", comp.color);
        el.setAttribute("position", `${x} ${y} ${z}`);
      }

      el.setAttribute("look-at", "#cameraRig");

      const text = document.createElement("a-text");
      text.setAttribute("value", comp.name);
      text.setAttribute("position", `${x} ${y + 0.55} ${z}`);
      text.setAttribute("align", "center");
      text.setAttribute("color", "#00ffff");
      text.setAttribute("width", "3");

      function toggle() {
        showingDesc = !showingDesc;

        text.setAttribute(
          "value",
          showingDesc ? comp.description : comp.name
        );

        speechSynthesis.cancel();
        speechSynthesis.speak(
          new SpeechSynthesisUtterance(
            showingDesc ? comp.description : comp.name
          )
        );
      }

      el.addEventListener("click", toggle);

      container.appendChild(el);
      container.appendChild(text);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Lab VR - PC Interativo</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>

    <!-- FUNDO -->
    <a-sky color="#0f172a"></a-sky>

    <!-- LUZES -->
    <a-light type="ambient" intensity="0.4"></a-light>
    <a-light type="directional" position="2 5 3" intensity="0.8"></a-light>
    <a-light type="point" position="0 3 0" intensity="0.6" color="#00ffff"></a-light>

    <!-- CHÃO -->
    <a-plane rotation="-90 0 0" width="30" height="30" color="#020617"></a-plane>

    <!-- MESA -->
    <a-box position="0 1 0" width="1.2" height="0.3" depth="1.2" color="#8B4513"></a-box>

    <!-- CONTAINER PARA COMPONENTES -->
    <a-entity id="componentes"></a-entity>

    <!-- TEXTO -->
    <a-text id="label" value="Clique em um componente" position="0 3 0" align="center" color="#00ffff"></a-text>

    <!-- CÂMERA -->
    <a-camera position="0 1.6 0">
      <a-cursor color="#00ffff"></a-cursor>
    </a-camera>

  </a-scene>

  <script>
    // Componente para sempre olhar para a câmera
    AFRAME.registerComponent('look-at-camera', {
      tick: function () {
        const cam = this.el.sceneEl.camera;
        if (!cam) return;
        const pos = new THREE.Vector3();
        cam.getWorldPosition(pos);
        this.el.object3D.lookAt(pos);
      }
    });

    // Lista de componentes
    const componentesData = [
      { name: "Processador", type: "box", w:0.6, h:0.08, d:0.6, color:"#2c2c2c" },
      { name: "Cooler", type: "cylinder", radius:0.4, height:0.2, color:"#888" },
      { name: "RAM", type: "box", w:0.2, h:0.8, d:0.1, color:"#1e88e5" },
      { name: "Placa-mãe", type: "box", w:2, h:0.15, d:1.5, color:"#228B22" },
      { name: "GPU", type: "box", w:1.5, h:0.3, d:0.5, color:"#666" },
      { name: "HD/SSD", type: "box", w:1, h:0.2, d:0.7, color:"#555" },
      { name: "Fonte", type: "box", w:0.8, h:0.5, d:0.8, color:"#111" }
    ];

    const radius = 3; // raio do círculo
    const centerY = 1.35; // altura dos objetos
    const container = document.getElementById('componentes');

    componentesData.forEach((comp, i) => {
      const angle = (i / componentesData.length) * 2 * Math.PI; // ângulo completo 360°
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;

      let el;
      if(comp.type === "box"){
        el = document.createElement("a-box");
        el.setAttribute("width", comp.w);
        el.setAttribute("height", comp.h);
        el.setAttribute("depth", comp.d);
      } else if(comp.type === "cylinder"){
        el = document.createElement("a-cylinder");
        el.setAttribute("radius", comp.radius);
        el.setAttribute("height", comp.height);
      }

      el.setAttribute("position", `${x} ${centerY} ${z}`);
      el.setAttribute("color", comp.color);
      el.setAttribute("class", "clickable");
      el.setAttribute("data-name", comp.name);
      el.setAttribute("look-at-camera", "");

      // Label do componente
      const label = document.createElement("a-text");
      label.setAttribute("value", comp.name);
      label.setAttribute("position", `${x} ${centerY + 0.6} ${z}`);
      label.setAttribute("align", "center");
      label.setAttribute("color", "#00ffff");
      label.setAttribute("look-at-camera", "");

      container.appendChild(el);
      container.appendChild(label);
    });

    // Função de clique
    const labelText = document.querySelector("#label");
    let selecionado = null;
    const objetos = document.querySelectorAll(".clickable");

    objetos.forEach(el => {
      el.addEventListener("click", () => {
        if(selecionado && selecionado !== el){
          const original = JSON.parse(selecionado.dataset.originalPosition);
          selecionado.setAttribute("animation__back", { property:"position", to:`${original.x} ${original.y} ${original.z}`, dur:500 });
          selecionado.removeAttribute("animation__rotate");
          selecionado.setAttribute("scale","1 1 1");
          selecionado.setAttribute("material","emissive","#000");
        }

        const nome = el.getAttribute("data-name");
        labelText.setAttribute("value", nome);
        speechSynthesis.speak(new SpeechSynthesisUtterance(nome));

        if(!el.dataset.originalPosition) el.dataset.originalPosition = JSON.stringify(el.getAttribute("position"));
        const pos = el.getAttribute("position");

        el.setAttribute("animation", { property:"position", dir:"alternate", dur:1000, loop:true, to:`${pos.x} ${pos.y+0.4} ${pos.z}` });
        el.setAttribute("animation__rotate", { property:"rotation", to:"0 360 0", loop:true, dur:3000 });
        el.setAttribute("animation__scale", { property:"scale", to:"1.2 1.2 1.2", dur:300 });
        el.setAttribute("material","emissive","#00ffff");

        selecionado = el;
      });
    });
  </script>
</body>
</html>

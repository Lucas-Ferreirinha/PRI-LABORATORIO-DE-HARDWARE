<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lab VR - IF Suave</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>

<a-scene background="color: #eaf4f4">

  <!-- LUZES -->
  <a-light type="ambient" intensity="0.8"></a-light>
  <a-light type="directional" position="0 10 5" intensity="0.7"></a-light>

  <!-- ASSETS -->
  <a-assets>

    <img id="cpu" src="images/processador.png">
    <img id="cooler" src="images/cooler.png">
    <img id="gpu" src="images/gpu.png">
    <img id="mb" src="images/placa_mae-removebg-preview.png">
    <img id="hd" src="images/HD.png">
    <img id="ram" src="images/memoriaH.png">

    <!-- TEXTURAS -->
    <img id="floorTexture" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
    <img id="ceilingTexture" src="https://cdn.aframe.io/a-painter/images/sky.jpg">

  </a-assets>

  <!-- CHÃO PRETO SUAVE -->
  <a-plane
    rotation="-90 0 0"
    width="50"
    height="30"
    position="0 0 0"
    material="
      color: #0f0f12;
      roughness: 1;
      metalness: 0;
      opacity: 0.92;
    ">
  </a-plane>

  <!-- CORREDOR CENTRAL (ajuda a navegação) -->
  <a-plane
    rotation="-90 0 0"
    position="0 0.01 -4.5"
    width="18"
    height="6"
    material="
      src: #floorTexture;
      repeat: 6 3;
      opacity: 0.25;
    ">
  </a-plane>

  <!-- TETO COM TEXTURA LEVE -->
  <a-plane
    position="0 6 -5"
    rotation="90 0 0"
    width="50"
    height="30"
    material="
      src: #ceilingTexture;
      repeat: 8 5;
      opacity: 0.25;
    ">
  </a-plane>

  <!-- PAREDES -->
  <a-box position="0 3 -15" width="50" height="6" depth="0.2" color="#e5e7eb"></a-box>
  <a-box position="-25 3 -5" width="0.2" height="6" depth="30" color="#e5e7eb"></a-box>
  <a-box position="25 3 -5" width="0.2" height="6" depth="30" color="#e5e7eb"></a-box>

  <!-- LOUSA -->
  <a-plane position="0 3 -14.8" width="8" height="3" color="#064e3b"></a-plane>

  <a-text
    value="Laboratorio de Hardware\nEscolha um componente"
    position="0 3.5 -14.7"
    align="center"
    color="#ffffff"
    width="10"
    font="https://cdn.aframe.io/fonts/mozillavr.fnt">
  </a-text>

  <!-- CÂMERA -->
  <a-entity id="cameraRig">
    <a-camera position="0 1.6 2">
      <a-cursor
        color="#22c55e"
        fuse="true"
        fuse-timeout="1000"
        raycaster="objects: .clickable">
      </a-cursor>
    </a-camera>
  </a-entity>

  <!-- COMPONENTES -->
  <a-entity id="componentes"></a-entity>

</a-scene>

<script>

const COMPONENTES = [
  { name: "Processador", desc: "Executa instruções do computador.", type: "cpu", link: "quiz_cpu.html" },
  { name: "Cooler", desc: "Resfria o processador.", type: "cooler", link: "quiz_cooler.html" },
  { name: "Memória RAM", desc: "Armazena dados temporários.", type: "ram", link: "quiz_ram.html" },
  { name: "Placa Mãe", desc: "Conecta todos os componentes.", type: "mb", link: "quiz_placa_mae.html" },
  { name: "GPU", desc: "Processa gráficos.", type: "gpu", link: "quiz_gpu.html" },
  { name: "HD SSD", desc: "Armazenamento de arquivos.", type: "hd", link: "quiz_hd.html" }
];

const POSICOES = [-10, -6, -2, 2, 6, 10];

const container = document.getElementById("componentes");

COMPONENTES.forEach((comp, i) => {

  const grupo = document.createElement("a-entity");

  // ✔ FIX: agora eles NÃO ficam "voando"
  grupo.setAttribute("position", `${POSICOES[i]} 0.9 -4.5`);
  grupo.setAttribute("look-at", "#cameraRig");

  // MESA NO CHÃO
  const mesa = document.createElement("a-box");
  mesa.setAttribute("width", "2");
  mesa.setAttribute("height", "0.1");
  mesa.setAttribute("depth", "1.2");
  mesa.setAttribute("color", "#cbd5e1");
  mesa.setAttribute("position", "0 0 0");
  grupo.appendChild(mesa);

  // IMAGEM DO COMPONENTE
  const img = document.createElement("a-image");
  img.setAttribute("src", `#${comp.type}`);
  img.setAttribute("width", "1.4");
  img.setAttribute("height", "1.1");
  img.setAttribute("position", "0 0.7 0");
  img.setAttribute("class", "clickable");
  grupo.appendChild(img);

  // TEXTO
  const texto = document.createElement("a-text");
  texto.setAttribute("value", comp.name);
  texto.setAttribute("position", "0 1.35 0");
  texto.setAttribute("align", "center");
  texto.setAttribute("color", "#111827");
  texto.setAttribute("width", "4");
  grupo.appendChild(texto);

  // BOTÃO
  const btn = document.createElement("a-plane");
  btn.setAttribute("width", "1.5");
  btn.setAttribute("height", "0.4");
  btn.setAttribute("color", "#16a34a");
  btn.setAttribute("position", "0 0.2 0.3");
  btn.setAttribute("class", "clickable");

  const btnTxt = document.createElement("a-text");
  btnTxt.setAttribute("value", "Iniciar Quiz");
  btnTxt.setAttribute("align", "center");
  btnTxt.setAttribute("color", "#fff");
  btnTxt.setAttribute("width", "4");
  btn.appendChild(btnTxt);

  grupo.appendChild(btn);

  btn.addEventListener("click", () => {
    let pontos = Number(localStorage.getItem("pontuacao")) || 0;
    localStorage.setItem("pontuacao", pontos + 10);
    window.location.href = comp.link;
  });

  container.appendChild(grupo);

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tutorial VR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
}
</style>

</head>

<body>

<a-scene background="color:#050816">

    <!-- LUZ -->
    <a-light type="ambient" intensity="1"></a-light>

    <!-- PAINEL PRINCIPAL -->
    <a-plane
        position="0 1.8 -4"
        width="8"
        height="11"
        color="#0b1220">
    </a-plane>

    <!-- TITULO -->
    <a-text
        value="BEM-VINDO AO LABORATORIO VR"
        position="0 4.4 -3.9"
        align="center"
        color="#38bdf8"
        width="8">
    </a-text>

    <!-- OBJETIVO -->
    <a-text
        value="OBJETIVO"
        position="0 3.6 -3.9"
        align="center"
        color="#ffffff"
        width="6">
    </a-text>

    <a-text
        value="Aprender sobre os componentes do computador."
        position="0 3.1 -3.9"
        align="center"
        color="#d1d5db"
        width="5">
    </a-text>

    <!-- COMO INTERAGIR -->
    <a-text
        value="COMO INTERAGIR"
        position="0 2.3 -3.9"
        align="center"
        color="#ffffff"
        width="6">
    </a-text>

    <a-text
        value="Olhe para um objeto por 2 segundos."
        position="0 1.8 -3.9"
        align="center"
        color="#d1d5db"
        width="5">
    </a-text>

    <a-text
        value="Quando o cursor completar o circulo,"
        position="0 1.45 -3.9"
        align="center"
        color="#d1d5db"
        width="5">
    </a-text>

    <a-text
        value="a acao sera executada."
        position="0 1.1 -3.9"
        align="center"
        color="#d1d5db"
        width="5">
    </a-text>

    <!-- MONITORES -->
    <a-text
        value="MONITORES"
        position="0 0.3 -3.9"
        align="center"
        color="#ffffff"
        width="6">
    </a-text>

    <a-text
        value="Cada monitor possui slides educativos"
        position="0 -0.2 -3.9"
        align="center"
        color="#d1d5db"
        width="5">
    </a-text>

    <a-text
        value="sobre um componente."
        position="0 -0.55 -3.9"
        align="center"
        color="#d1d5db"
        width="5">
    </a-text>

    <!-- QUIZZES -->
    <a-text
        value="QUIZZES"
        position="0 -1.3 -3.9"
        align="center"
        color="#ffffff"
        width="6">
    </a-text>

    <a-text
        value="Cada componente possui um quiz."
        position="0 -1.8 -3.9"
        align="center"
        color="#d1d5db"
        width="5">
    </a-text>

    <a-text
        value="Responda corretamente para ganhar pontos."
        position="0 -2.15 -3.9"
        align="center"
        color="#d1d5db"
        width="5">
    </a-text>

    <!-- IMPORTANTE -->
    <a-text
        value="IMPORTANTE"
        position="0 -2.9 -3.9"
        align="center"
        color="#fbbf24"
        width="6">
    </a-text>

    <a-text
        value="Os pontos de cada quiz contam apenas uma vez."
        position="0 -3.35 -3.9"
        align="center"
        color="#d1d5db"
        width="5">
    </a-text>

    <!-- BOTAO -->
    <a-plane
        id="entrar"
        class="clickable"
        width="3.5"
        height="0.9"
        position="0 -4.3 -3.8"
        color="#22c55e">

        <a-text
            value="ENTRAR NO LABORATORIO"
            align="center"
            color="#FFFFFF"
            width="5"
            position="0 0 0.05">
        </a-text>

    </a-plane>

    <!-- CAMERA -->
    <a-camera
        position="0 1.6 7"
        raycaster="objects: .clickable">

        <a-cursor
            fuse="true"
            fuse-timeout="2000"
            color="#00e5ff">
        </a-cursor>

    </a-camera>

</a-scene>

<script>

document
.getElementById("entrar")
.addEventListener("click",()=>{

    window.location.href = "laboratorio.html";

});

</script>

</body>
</html>

```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Placa-Mãe</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
}
</style>

</head>
<body>

<a-scene background="color:#05070d">

    <a-assets>
        <img id="slide" src="images/placa.png">
    </a-assets>

    <a-light
        type="ambient"
        intensity="1">
    </a-light>

    <a-plane
        rotation="-90 0 0"
        width="50"
        height="50"
        color="#111827">
    </a-plane>

    <a-image
        src="#slide"
        width="12"
        height="6.75"
        position="0 4 -10">
    </a-image>

    <a-plane
        id="exit"
        class="clickable"
        color="#f59e0b"
        width="2"
        height="0.8"
        position="0 0.3 -9">

        <a-text
            value="SAIR"
            align="center"
            color="#ffffff"
            width="6">
        </a-text>

    </a-plane>

    <a-camera
        position="0 1.6 -4"
        raycaster="objects: .clickable">

        <a-cursor
            fuse="true"
            fuse-timeout="2000"
            color="#00e5ff">
        </a-cursor>

    </a-camera>

</a-scene>

<script>

document
.getElementById("exit")
.addEventListener("click", () => {

   window.location.href = "laboratorio.html";

});

</script>

</body>
</html>
```

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz VR - CPU</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #050816;
    }
  </style>
</head>

<body>

<a-scene background="color: #050816">

  <!-- LUZ -->
  <a-light type="ambient" intensity="1"></a-light>

  <!-- CÂMERA -->
  <a-entity>

    <a-camera
      position="0 1.6 0"
      raycaster="objects: .clickable">

      <!-- CURSOR -->
      <!-- PRECISA OLHAR 2 SEGUNDOS -->
      <a-cursor
        fuse="true"
        fuse-timeout="2000"
        color="#38bdf8">
      </a-cursor>

    </a-camera>

  </a-entity>

  <!-- QUIZ -->
  <a-entity id="quiz"></a-entity>

</a-scene>

<script>

const perguntas = [

  {
    pergunta: "Qual é a funcao do processador?",
    opcoes: [
      "Executar instrucoes",
      "Armazenar arquivos",
      "Resfriar sistema"
    ],
    correta: 0
  },

  {
    pergunta: "O processador e conhecido como:",
    opcoes: [
      "Cerebro do computador",
      "Memoria RAM",
      "Fonte de energia"
    ],
    correta: 0
  },

  {
    pergunta: "O processador trabalha junto com:",
    opcoes: [
      "Memoria RAM",
      "Monitor",
      "Teclado"
    ],
    correta: 0
  }

];

let atual = 0;
let pontosQuiz = 0;

const quiz = document.getElementById("quiz");

// ==============================
// LIMPAR TELA
// ==============================
function limpar() {

  quiz.innerHTML = "";

}

// ==============================
// RENDERIZAR QUIZ
// ==============================
function renderizar() {

  limpar();

  // FINAL
  if (atual >= perguntas.length) {

    resultado();
    return;

  }

  const q = perguntas[atual];

  // ==============================
  // PERGUNTA
  // ==============================
  const titulo = document.createElement("a-text");

  titulo.setAttribute("value", q.pergunta);
  titulo.setAttribute("position", "0 2.5 -3");
  titulo.setAttribute("align", "center");
  titulo.setAttribute("color", "#38bdf8");
  titulo.setAttribute("width", "6");

  quiz.appendChild(titulo);

  // ==============================
  // PONTUAÇÃO
  // ==============================
  const score = document.createElement("a-text");

 score.setAttribute(
  "value",
  `Pontos neste quiz: ${pontosQuiz}`
);
  score.setAttribute("position", "-2.2 3.2 -3");
  score.setAttribute("color", "#ffffff");
  score.setAttribute("width", "4");

  quiz.appendChild(score);

  // ==============================
  // OPÇÕES
  // ==============================
  q.opcoes.forEach((op, i) => {

    const container = document.createElement("a-entity");

    container.setAttribute(
      "position",
      `0 ${1.8 - i * 0.9} -3`
    );

    // BOTÃO
    const btn = document.createElement("a-plane");

    btn.setAttribute("width", "4");
    btn.setAttribute("height", "0.75");
    btn.setAttribute("color", "#06b6d4");
    btn.setAttribute("class", "clickable");

    btn.setAttribute(
      "material",
      "shader:flat; opacity:0.9"
    );

    // TEXTO
    const txt = document.createElement("a-text");

    txt.setAttribute("value", op);
    txt.setAttribute("align", "center");
    txt.setAttribute("color", "#ffffff");
    txt.setAttribute("width", "6");
    txt.setAttribute("position", "0 0 0.05");

    container.appendChild(btn);
    container.appendChild(txt);

    // EVITA MULTIPLOS CLIQUES
    let respondido = false;

    // ==============================
    // RESPOSTA
    // ==============================
    container.addEventListener("click", () => {

      if (respondido) return;

      respondido = true;

      // CORRETA
      if (i === q.correta) {

        btn.setAttribute("color", "#22c55e");

        pontosQuiz += 10;

      }

      // ERRADA
      else {

        btn.setAttribute("color", "#ef4444");

      }

      // MOSTRA QUAL ERA A CERTA
      const botoes = quiz.querySelectorAll("a-plane");

      botoes.forEach((b, index) => {

        if (index === q.correta) {

          b.setAttribute("color", "#22c55e");

        }

      });

      // ESPERA MAIS TEMPO
      setTimeout(() => {

        atual++;

        renderizar();

      }, 3500);

    });

    quiz.appendChild(container);

  });

}

// ==============================
// RESULTADO FINAL
// ==============================
function resultado() {

  limpar();

  if (!localStorage.getItem("quiz_cpu_concluido")) {

  let pontosGerais =
  Number(localStorage.getItem("pontuacao")) || 0;

  pontosGerais += pontosQuiz;

  localStorage.setItem(
    "pontuacao",
    pontosGerais
  );

  localStorage.setItem(
    "quiz_cpu_concluido",
    "true"
  );
}

  // PAINEL
  const painel = document.createElement("a-plane");

  painel.setAttribute("width", "5");
  painel.setAttribute("height", "3");
  painel.setAttribute("position", "0 1.6 -3");

  painel.setAttribute(
    "material",
    "color:#0b1220; opacity:0.95; shader:flat"
  );

  // TEXTO
  const txt = document.createElement("a-text");
const total =
Number(localStorage.getItem("pontuacao")) || 0;

txt.setAttribute(
  "value",
  `Quiz Finalizado!\nPontuacao Total: ${total}`
);

  txt.setAttribute("align", "center");
  txt.setAttribute("color", "#38bdf8");
  txt.setAttribute("width", "6");
  txt.setAttribute("position", "0 0.6 0.01");

  // BOTÃO
  const btn = document.createElement("a-plane");

  btn.setAttribute("width", "2.6");
  btn.setAttribute("height", "0.8");
  btn.setAttribute("position", "0 -0.6 0.01");
  btn.setAttribute("color", "#38bdf8");
  btn.setAttribute("class", "clickable");

  btn.setAttribute(
    "material",
    "shader:flat; opacity:0.9"
  );

  // TEXTO BOTÃO
  const bt = document.createElement("a-text");

  bt.setAttribute(
    "value",
    "Voltar ao laboratorio"
  );

  bt.setAttribute("align", "center");
  bt.setAttribute("color", "#ffffff");
  bt.setAttribute("width", "5");
  bt.setAttribute("position", "0 0 0.05");

  btn.appendChild(bt);

  // AÇÃO
  btn.addEventListener("click", () => {

   window.location.href = "laboratorio.html";

  });

  painel.appendChild(txt);
  painel.appendChild(btn);

  quiz.appendChild(painel);

}

// INICIAR
renderizar();

</script>

</body>
</html>

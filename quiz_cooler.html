<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz VR - Cooler</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #050816;
    }
  </style>
</head>

<body>

<a-scene background="color: #050816">

  <!-- LUZ -->
  <a-light type="ambient" intensity="1"></a-light>

  <!-- CAMERA -->
  <a-camera raycaster="objects: .clickable">

    <!-- CURSOR -->
    <!-- fuse-timeout maior = precisa olhar mais tempo -->
    <a-cursor
      fuse="true"
      fuse-timeout="2000"
      color="#00e5ff">
    </a-cursor>

  </a-camera>

  <!-- QUIZ -->
  <a-entity id="quiz"></a-entity>

</a-scene>

<script>

const perguntas = [
  {
    pergunta: "Qual é a funcao do cooler?",
    opcoes: [
      "Resfriar o processador",
      "Armazenar arquivos",
      "Aumentar FPS"
    ],
    correta: 0
  },

  {
    pergunta: "O que acontece sem o cooler?",
    opcoes: [
      "Superaquecimento",
      "Mais RAM",
      "Mais armazenamento"
    ],
    correta: 0
  },

  {
    pergunta: "Onde o cooler atua?",
    opcoes: [
      "No processador",
      "Na GPU",
      "No HD"
    ],
    correta: 0
  }
];

let atual = 0;
let pontosQuiz = 0;

const quiz = document.getElementById("quiz");

function limpar() {
  quiz.innerHTML = "";
}

function renderizar() {

  limpar();

  // FINAL
  if (atual >= perguntas.length) {
    resultado();
    return;
  }

  const q = perguntas[atual];

  // -----------------------------
  // PERGUNTA
  // -----------------------------
  const titulo = document.createElement("a-text");

  titulo.setAttribute("value", q.pergunta);
  titulo.setAttribute("position", "0 2.5 -3");
  titulo.setAttribute("align", "center");
  titulo.setAttribute("color", "#38bdf8");
  titulo.setAttribute("width", "6");

  quiz.appendChild(titulo);

  // -----------------------------
  // PONTUAÇÃO
  // -----------------------------
 const pontuacao = document.createElement("a-text");

pontuacao.setAttribute(
  "value",
  `Pontos neste quiz: ${pontosQuiz}`
);

pontuacao.setAttribute("position", "-2.2 3.2 -3");
pontuacao.setAttribute("color", "#ffffff");
pontuacao.setAttribute("width", "4");

  quiz.appendChild(pontuacao);

  // -----------------------------
  // OPÇÕES
  // -----------------------------
  q.opcoes.forEach((op, i) => {

    const container = document.createElement("a-entity");

    container.setAttribute(
      "position",
      `0 ${1.5 - i * 1} -3`
    );

    // BOTÃO
    const btn = document.createElement("a-plane");

    btn.setAttribute("width", "4");
    btn.setAttribute("height", "0.8");
    btn.setAttribute("color", "#06b6d4");
    btn.setAttribute("class", "clickable");
    btn.setAttribute(
      "material",
      "shader: flat; opacity: 0.9"
    );

    // TEXTO
    const txt = document.createElement("a-text");

    txt.setAttribute("value", op);
    txt.setAttribute("align", "center");
    txt.setAttribute("color", "#ffffff");
    txt.setAttribute("width", "6");
    txt.setAttribute("position", "0 0 0.05");

    container.appendChild(btn);
    container.appendChild(txt);

    // EVITA MULTIPLOS CLIQUES
    let respondido = false;

    container.addEventListener("click", () => {

      if (respondido) return;

      respondido = true;

      // -----------------------------
      // RESPOSTA CORRETA
      // -----------------------------
      if (i === q.correta) {

        btn.setAttribute("color", "#22c55e");

       pontosQuiz += 10;
      }

      // -----------------------------
      // RESPOSTA ERRADA
      // -----------------------------
      else {

        btn.setAttribute("color", "#ef4444");
      }

      // -----------------------------
      // MOSTRA A CORRETA
      // -----------------------------
      const botoes = quiz.querySelectorAll("a-plane");

      botoes.forEach((b, index) => {

        if (index === q.correta) {

          b.setAttribute("color", "#22c55e");
        }

      });

      // -----------------------------
      // ESPERA PARA VER A RESPOSTA
      // -----------------------------
      setTimeout(() => {

        atual++;

        renderizar();

      }, 3500);

    });

    quiz.appendChild(container);

  });

}

// =====================================
// RESULTADO FINAL
// =====================================
function resultado() {

  limpar();
  
  if (!localStorage.getItem("quiz_cooler_concluido")) {

  let pontosGerais =
  Number(localStorage.getItem("pontuacao")) || 0;

  pontosGerais += pontosQuiz;

  localStorage.setItem(
    "pontuacao",
    pontosGerais
  );

  localStorage.setItem(
    "quiz_cooler_concluido",
    "true"
  );
}
  // PAINEL
  const painel = document.createElement("a-plane");

  painel.setAttribute("width", "5");
  painel.setAttribute("height", "3");
  painel.setAttribute("position", "0 1.6 -3");
  painel.setAttribute("color", "#0b1220");
  painel.setAttribute("opacity", "0.95");

  // TEXTO
  const texto = document.createElement("a-text");

const total =
Number(localStorage.getItem("pontuacao")) || 0;

texto.setAttribute(
  "value",
  `Quiz Finalizado!\nPontuação Total: ${total}`
);

  texto.setAttribute("align", "center");
  texto.setAttribute("color", "#38bdf8");
  texto.setAttribute("width", "6");
  texto.setAttribute("position", "0 0.6 0.01");

  // BOTÃO
  const botao = document.createElement("a-plane");

  botao.setAttribute("width", "2.6");
  botao.setAttribute("height", "0.8");
  botao.setAttribute("position", "0 -0.6 0.01");
  botao.setAttribute("color", "#38bdf8");
  botao.setAttribute("class", "clickable");

  // TEXTO BOTÃO
  const textoBotao = document.createElement("a-text");

  textoBotao.setAttribute(
    "value",
    "Voltar ao laboratorio"
  );

  textoBotao.setAttribute("align", "center");
  textoBotao.setAttribute("color", "#ffffff");
  textoBotao.setAttribute("width", "5");
  textoBotao.setAttribute("position", "0 0 0.05");

  botao.appendChild(textoBotao);

  // AÇÃO
  botao.addEventListener("click", () => {

   window.location.href = "laboratorio.html";

  });

  painel.appendChild(texto);
  painel.appendChild(botao);

  quiz.appendChild(painel);

}

// INICIAR
renderizar();

</script>

</body>
</html>

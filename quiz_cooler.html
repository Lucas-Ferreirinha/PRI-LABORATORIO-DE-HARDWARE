<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz do Cooler</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 220px;
      background: #06b6d4;
      color: white;
      border: none;
      cursor: pointer;
    }

    #resultado {
      margin-top: 30px;
      font-size: 22px;
      color: #22c55e;
    }
  </style>
</head>

<body>

<h1>Quiz do Cooler ❄️</h1>

<div id="quiz"></div>

<button onclick="finalizar()">Finalizar</button>

<div id="resultado"></div>

<script>
  let pontuacao = 0;

  const perguntas = [
    {
      pergunta: "Qual é a função do cooler?",
      opcoes: ["Resfriar o processador", "Armazenar dados", "Executar programas"],
      correta: 0
    },
    {
      pergunta: "Se o cooler parar de funcionar, o que pode acontecer?",
      opcoes: ["Superaquecimento", "Mais memória", "Melhor desempenho"],
      correta: 0
    }
  ];

  const quizDiv = document.getElementById("quiz");

  perguntas.forEach((q) => {
    const div = document.createElement("div");

    div.innerHTML = `<p>${q.pergunta}</p>`;

    q.opcoes.forEach((op, j) => {
      const btn = document.createElement("button");
      btn.innerText = op;

      btn.onclick = () => {
        if (j === q.correta) {
          pontuacao++;
          btn.style.background = "green";
        } else {
          btn.style.background = "red";
        }
      };

      div.appendChild(btn);
    });

    quizDiv.appendChild(div);
  });

  function finalizar() {
    document.getElementById("resultado").innerText =
      "Pontuação: " + pontuacao;
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz VR - Cooler</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <a-sky color="#0f172a"></a-sky>

    <a-camera position="0 1.6 0">
      <a-cursor fuse="true" fuse-timeout="1200" color="#38bdf8"></a-cursor>
    </a-camera>

    <!-- Pergunta -->
    <a-text id="pergunta"
            position="0 2.3 -3"
            align="center"
            width="4"
            color="#ffffff">
    </a-text>

    <!-- Opções -->
    <a-entity id="opcoes"></a-entity>

    <!-- Resultado -->
    <a-text id="resultado"
            position="0 1.4 -3"
            align="center"
            width="4"
            color="#22c55e"
            visible="false">
    </a-text>

  </a-scene>

  <script>
    const perguntas = [
      {
        pergunta: "Qual é a função do cooler?",
        opcoes: ["Resfriar o processador", "Armazenar dados", "Executar programas"],
        correta: 0
      },
      {
        pergunta: "Se o cooler parar de funcionar, o que pode acontecer?",
        opcoes: ["Superaquecimento", "Mais memória", "Melhor desempenho"],
        correta: 0
      }
    ];

    let atual = 0;
    let pontuacao = 0;

    const perguntaEl = document.getElementById("pergunta");
    const opcoesEl = document.getElementById("opcoes");
    const resultadoEl = document.getElementById("resultado");

    function mostrarPergunta() {
      opcoesEl.innerHTML = "";

      const q = perguntas[atual];
      perguntaEl.setAttribute("value", q.pergunta);

      q.opcoes.forEach((op, i) => {

        const btn = document.createElement("a-plane");

        btn.setAttribute("width", "2.8");
        btn.setAttribute("height", "0.6");

        // empilhamento vertical
        btn.setAttribute("position", `0 ${1.2 - i * 0.8} -3`);

        btn.setAttribute("color", "#06b6d4");

        const txt = document.createElement("a-text");
        txt.setAttribute("value", op);
        txt.setAttribute("align", "center");
        txt.setAttribute("color", "#fff");
        txt.setAttribute("width", "4");
        txt.setAttribute("position", "0 0 0.01");

        btn.appendChild(txt);

        btn.addEventListener("click", () => {

          if (i === q.correta) {
            btn.setAttribute("color", "green");
            pontuacao++;
          } else {
            btn.setAttribute("color", "red");
          }

          // trava cliques
          Array.from(opcoesEl.children).forEach(b => {
            b.removeEventListener("click", () => {});
          });

          setTimeout(() => {
            atual++;

            if (atual < perguntas.length) {
              mostrarPergunta();
            } else {
              mostrarResultado();
            }
          }, 1000);
        });

        opcoesEl.appendChild(btn);
      });
    }

    function mostrarResultado() {
      perguntaEl.setAttribute("visible", false);
      opcoesEl.setAttribute("visible", false);

      resultadoEl.setAttribute("visible", true);
      resultadoEl.setAttribute(
        "value",
        `Pontuação: ${pontuacao} / ${perguntas.length}`
      );
    }

    mostrarPergunta();
  </script>

</body>
</html>
